<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>EasternWH | Parts Lookup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#161b22;
    --surface:#1f2630;
    --surface-2:#262e3a;
    --line:#323c4a;
    --amber:#f5a623;
    --amber-dim:#3a2f1c;
    --text:#e7ebf1;
    --text-dim:#8d98a8;
    --green:#3ddc84;
    --green-dim:#11301f;
    --blue:#5aa9ff;
    --blue-dim:#142a40;
    --red:#ff6b6b;
    --red-dim:#3a1a1a;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  body{margin:0;}
  html,body{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    -webkit-tap-highlight-color:transparent;
  }
  .app{
    max-width:560px;
    margin:0 auto;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    padding-bottom:24px;
  }

  /* HEADER */
  header.top{
    position:sticky;
    top:0;
    z-index:30;
    background:var(--bg);
    border-bottom:1px solid var(--line);
    padding:18px 16px 14px;
  }
  .brandrow{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:14px;
  }
  .tag-icon{
    width:34px;height:34px;
    border-radius:7px;
    background:var(--amber);
    color:#1a1408;
    font-family:'Oswald',sans-serif;
    font-weight:700;
    display:flex;align-items:center;justify-content:center;
    font-size:14px;
    letter-spacing:0.5px;
    position:relative;
    flex-shrink:0;
  }
  .tag-icon::after{
    content:"";
    position:absolute;
    top:4px;left:4px;
    width:4px;height:4px;
    border-radius:50%;
    background:#1a1408;
    opacity:0.35;
  }
  .brandrow h1{
    font-family:'Oswald',sans-serif;
    font-size:16px;
    font-weight:600;
    margin:0;
    letter-spacing:0.2px;
  }
  .brandrow p{
    margin:1px 0 0;
    font-size:11.5px;
    color:var(--text-dim);
    text-transform:uppercase;
    letter-spacing:0.6px;
  }
  .conn{
    margin-left:auto;
    display:flex;
    align-items:center;
    gap:6px;
    font-size:11px;
    color:var(--text-dim);
  }
  .conn .dot{
    width:7px;height:7px;border-radius:50%;
    background:var(--text-dim);
    transition:background .3s;
  }
  .conn .dot.live{background:var(--green); box-shadow:0 0 0 0 rgba(61,220,132,0.5); animation:pulse 1.8s infinite;}
  .conn .dot.err{background:var(--red);}
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(61,220,132,0.45);}
    70%{box-shadow:0 0 0 6px rgba(61,220,132,0);}
    100%{box-shadow:0 0 0 0 rgba(61,220,132,0);}
  }

  .searchwrap{
    position:relative;
  }
  .searchwrap input{
    width:100%;
    background:var(--surface);
    border:1px solid var(--line);
    color:var(--text);
    font-size:14.5px;
    border-radius:var(--radius);
    padding:11px 14px 11px 36px;
    font-family:'Inter',sans-serif;
    outline:none;
  }
  .searchwrap input:focus{border-color:var(--amber);}
  .searchwrap svg{
    position:absolute;
    left:12px;top:50%;
    transform:translateY(-50%);
    width:15px;height:15px;
    color:var(--text-dim);
  }
  .searchwrap input::placeholder{color:var(--text-dim);}

  /* FILTER CHIPS - status */
  .filterscroll{
    display:flex;
    gap:7px;
    overflow-x:auto;
    margin-top:12px;
    padding-bottom:2px;
    scrollbar-width:none;
  }
  .filterscroll::-webkit-scrollbar{display:none;}
  .chip{
    flex-shrink:0;
    font-size:12.5px;
    font-weight:500;
    padding:7px 13px;
    border-radius:100px;
    background:var(--surface);
    border:1px solid var(--line);
    color:var(--text-dim);
    white-space:nowrap;
    cursor:pointer;
    user-select:none;
  }
  .chip.active{
    background:var(--amber);
    border-color:var(--amber);
    color:#1a1408;
    font-weight:600;
  }

  /* second row: equip dropdown + sort */
  .subfilters{
    display:flex;
    gap:8px;
    margin-top:10px;
  }
  .subfilters select{
    flex:1;
    background:var(--surface);
    border:1px solid var(--line);
    color:var(--text);
    font-size:13px;
    border-radius:8px;
    padding:8px 10px;
    font-family:'Inter',sans-serif;
    outline:none;
  }
  .subfilters .more-btn{
    flex-shrink:0;
    width:38px;
    display:flex;align-items:center;justify-content:center;
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:8px;
    color:var(--text-dim);
    cursor:pointer;
  }
  .subfilters .more-btn.active{ color:var(--amber); border-color:var(--amber); }

  /* count bar */
  .countbar{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    padding:14px 16px 8px;
  }
  .countbar .num{
    font-family:'JetBrains Mono',monospace;
    font-size:13px;
    color:var(--text-dim);
  }
  .countbar .num b{color:var(--text); font-weight:600;}
  .countbar .clearbtn{
    font-size:12.5px;
    color:var(--amber);
    cursor:pointer;
    display:none;
  }
  .countbar .clearbtn.show{display:block;}

  /* LIST */
  .list{
    padding:0 16px;
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .card{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:13px 14px;
    position:relative;
    overflow:hidden;
  }
  .card::before{
    content:"";
    position:absolute;
    left:0;top:0;bottom:0;
    width:3px;
  }
  .card.s-pending::before{background:var(--text-dim);}
  .card.s-approved::before{background:var(--blue);}
  .card.s-received::before{background:var(--amber);}
  .card.s-installed::before{background:var(--green);}

  .card-top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:8px;
  }
  .card-equip{
    display:flex;
    align-items:center;
    gap:8px;
  }
  .equip-thumb{
    width:30px;height:30px;
    border-radius:6px;
    object-fit:cover;
    border:1px solid var(--line);
    background:var(--surface-2);
    flex-shrink:0;
    cursor:pointer;
  }
    font-family:'JetBrains Mono',monospace;
    font-size:11.5px;
    font-weight:600;
    background:var(--surface-2);
    border:1px solid var(--line);
    border-radius:5px;
    padding:2px 7px;
    color:var(--amber);
    letter-spacing:0.3px;
  }
  .part-name{
    font-size:14.5px;
    font-weight:600;
    margin:8px 0 2px;
    line-height:1.3;
  }
  .part-number{
    font-family:'JetBrains Mono',monospace;
    font-size:11.5px;
    color:var(--text-dim);
  }

  .badge{
    font-size:10.5px;
    font-weight:600;
    text-transform:uppercase;
    letter-spacing:0.4px;
    padding:4px 8px;
    border-radius:5px;
    white-space:nowrap;
    flex-shrink:0;
  }
  .badge.s-pending{background:var(--surface-2); color:var(--text-dim);}
  .badge.s-approved{background:var(--blue-dim); color:var(--blue);}
  .badge.s-received{background:var(--amber-dim); color:var(--amber);}
  .badge.s-installed{background:var(--green-dim); color:var(--green);}

  .meta-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:6px 10px;
    margin-top:10px;
    padding-top:10px;
    border-top:1px solid var(--line);
  }
  .meta-item{
    font-size:12px;
  }
  .meta-item .k{
    color:var(--text-dim);
    font-size:10.5px;
    text-transform:uppercase;
    letter-spacing:0.4px;
    display:block;
    margin-bottom:2px;
  }
  .meta-item .v{
    color:var(--text);
  }
  .meta-item .v.dim{ color:var(--text-dim); }
  .meta-item.full{grid-column:1/-1;}

  .card-foot-row{
    display:flex;
    gap:6px;
    margin-top:8px;
    flex-wrap:wrap;
  }
  .tagbit{
    font-size:11px;
    background:var(--surface-2);
    border-radius:5px;
    padding:3px 7px;
    color:var(--text-dim);
  }
  .tagbit b{color:var(--text); font-weight:600;}

  .remarks{
    margin-top:8px;
    font-size:12px;
    color:var(--text-dim);
    font-style:italic;
    line-height:1.4;
  }

  /* empty state */
  .empty{
    text-align:center;
    padding:60px 24px;
    color:var(--text-dim);
  }
  .empty .icon{font-size:34px; margin-bottom:10px;}
  .empty h3{color:var(--text); font-size:15px; margin:0 0 4px; font-family:'Oswald',sans-serif;}
  .empty p{font-size:13px; margin:0;}

  /* bottom sheet for advanced filters */
  .sheet-overlay{
    position:fixed; inset:0;
    background:rgba(0,0,0,0.55);
    z-index:90;
    opacity:0;
    pointer-events:none;
    transition:opacity .2s;
  }
  .sheet-overlay.open{opacity:1; pointer-events:auto;}
  .sheet{
    position:fixed;
    left:0;right:0;bottom:0;
    z-index:91;
    background:var(--surface);
    border-top:1px solid var(--line);
    border-radius:16px 16px 0 0;
    padding:18px 16px calc(18px + env(safe-area-inset-bottom));
    transform:translateY(100%);
    transition:transform .25s ease;
    max-width:560px;
    margin:0 auto;
    max-height:80vh;
    overflow-y:auto;
  }
  .sheet.open{transform:translateY(0);}
  .sheet h3{
    font-family:'Oswald',sans-serif;
    font-size:15px;
    margin:0 0 14px;
  }
  .sheet .field{margin-bottom:14px;}
  .sheet .field label{
    display:block;
    font-size:11.5px;
    color:var(--text-dim);
    text-transform:uppercase;
    letter-spacing:0.4px;
    margin-bottom:6px;
  }
  .sheet select{
    width:100%;
    background:var(--surface-2);
    border:1px solid var(--line);
    color:var(--text);
    border-radius:8px;
    padding:10px 12px;
    font-size:14px;
    outline:none;
  }
  .sheet-actions{
    display:flex;
    gap:10px;
    margin-top:6px;
  }
  .sheet-actions button{
    flex:1;
    padding:11px;
    border-radius:8px;
    font-weight:600;
    font-size:13.5px;
    border:none;
    cursor:pointer;
  }
  .btn-reset{background:var(--surface-2); color:var(--text);}
  .btn-apply{background:var(--amber); color:#1a1408;}

  .photo-lightbox{
    position:fixed; inset:0;
    background:rgba(0,0,0,0.85);
    z-index:120;
    display:none;
    align-items:center;
    justify-content:center;
    padding:24px;
  }
  .photo-lightbox.open{display:flex;}
  .photo-lightbox img{
    max-width:100%;
    max-height:100%;
    border-radius:10px;
    border:1px solid var(--line);
  }

  /* TABS */
  .tabbar{
    display:flex;
    gap:6px;
    margin-bottom:14px;
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:10px;
    padding:4px;
  }
  .tabbtn{
    flex:1;
    background:transparent;
    border:none;
    color:var(--text-dim);
    font-family:'Inter',sans-serif;
    font-size:13.5px;
    font-weight:600;
    padding:9px 0;
    border-radius:7px;
    cursor:pointer;
  }
  .tabbtn.active{
    background:var(--amber);
    color:#1a1408;
  }

  .page{display:none;}
  .page.active-page{display:block;}

  /* DASHBOARD */
  .stat-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    padding:14px 16px 4px;
  }
  .stat-card{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:14px;
    position:relative;
    overflow:hidden;
  }
  .stat-card::before{
    content:"";
    position:absolute;
    left:0;top:0;bottom:0;
    width:3px;
  }
  .stat-pending::before{background:var(--text-dim);}
  .stat-approved::before{background:var(--blue);}
  .stat-received::before{background:var(--amber);}
  .stat-installed::before{background:var(--green);}
  .stat-icon{font-size:18px; margin-bottom:8px;}
  .stat-num{
    font-family:'Oswald',sans-serif;
    font-size:26px;
    font-weight:700;
    line-height:1;
    margin-bottom:4px;
  }
  .stat-label{
    font-size:11.5px;
    color:var(--text-dim);
    line-height:1.3;
  }

  .panel-head{
    padding:18px 16px 8px;
  }
  .panel-head h3{
    font-family:'Oswald',sans-serif;
    font-size:15px;
    margin:0 0 2px;
  }
  .panel-head p{
    font-size:12px;
    color:var(--text-dim);
    margin:0;
  }

  ::-webkit-scrollbar{width:0;height:0;}

  @media (prefers-reduced-motion: reduce){
    .conn .dot.live{animation:none;}
    .sheet{transition:none;}
  }
</style>
</head>
<body>
<div class="app">

  <header class="top">
    <div class="brandrow">
      <div class="tag-icon">MP</div>
      <div>
        <h1>EasternWH</h1>
        <p>Parts Lookup</p>
      </div>
      <div class="conn">
        <span class="dot" id="connDot"></span>
        <span id="connText">Connecting</span>
      </div>
    </div>

    <div class="tabbar">
      <button class="tabbtn active" id="tabDashboard" data-tab="dashboard">Dashboard</button>
      <button class="tabbtn" id="tabRecords" data-tab="records">Records</button>
    </div>

    <div id="recordsControls">
      <div class="searchwrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" placeholder="Search equipment, part, equip no., PR no., remarks..." />
      </div>

      <div class="filterscroll" id="statusChips">
        <div class="chip active" data-status="">All</div>
        <div class="chip" data-status="Pending for approval">Pending</div>
        <div class="chip" data-status="Approved waiting for delivery">Approved</div>
        <div class="chip" data-status="Received stored at warehouse">Received</div>
        <div class="chip" data-status="Installed">Installed</div>
      </div>

      <div class="subfilters">
        <select id="equipFilter">
          <option value="">All equipment</option>
        </select>
        <select id="sortSelect">
          <option value="recent">Most recent</option>
          <option value="equip">Equip No. (A–Z)</option>
          <option value="part">Part name (A–Z)</option>
        </select>
        <div class="more-btn" id="moreBtn" title="More filters">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/><circle cx="9" cy="6" r="1.6" fill="currentColor" stroke="none"/><circle cx="15" cy="12" r="1.6" fill="currentColor" stroke="none"/><circle cx="9" cy="18" r="1.6" fill="currentColor" stroke="none"/></svg>
        </div>
      </div>
    </div>
  </header>

  <div class="page active-page" id="dashboardPage">
    <div class="stat-grid">
      <div class="stat-card stat-pending">
        <div class="stat-icon">⏳</div>
        <div class="stat-num" id="statPending">0</div>
        <div class="stat-label">Pending for approval</div>
      </div>
      <div class="stat-card stat-approved">
        <div class="stat-icon">📝</div>
        <div class="stat-num" id="statApproved">0</div>
        <div class="stat-label">Approved, awaiting delivery</div>
      </div>
      <div class="stat-card stat-received">
        <div class="stat-icon">📥</div>
        <div class="stat-num" id="statReceived">0</div>
        <div class="stat-label">Received at warehouse</div>
      </div>
      <div class="stat-card stat-installed">
        <div class="stat-icon">✅</div>
        <div class="stat-num" id="statInstalled">0</div>
        <div class="stat-label">Installed</div>
      </div>
    </div>

    <div class="panel-head">
      <h3>Recent activity</h3>
      <p>Latest 5 updates</p>
    </div>
    <div class="list" id="recentList"></div>
  </div>

  <div class="page" id="recordsPage">
    <div class="countbar">
      <div class="num"><b id="resultCount">0</b> of <span id="totalCount">0</span> records</div>
      <div class="clearbtn" id="clearAllBtn">Clear filters</div>
    </div>

    <div class="list" id="list"></div>
  </div>
</div>

<div class="sheet-overlay" id="sheetOverlay"></div>
<div class="sheet" id="sheet">
  <h3>More filters</h3>
  <div class="field">
    <label>Supplier</label>
    <select id="supplierFilter"><option value="">All suppliers</option></select>
  </div>
  <div class="field">
    <label>Location</label>
    <select id="locationFilter"><option value="">All locations</option></select>
  </div>
  <div class="sheet-actions">
    <button class="btn-reset" id="sheetReset">Reset</button>
    <button class="btn-apply" id="sheetApply">Apply</button>
  </div>
</div>

<div class="photo-lightbox" id="photoLightbox">
  <img id="photoLightboxImg" src="" alt="Equipment photo" />
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyD-K1paSxDiVE6h9MVS0vFYihvDzeu8yMc",
  authDomain: "easternwh-14c32.firebaseapp.com",
  databaseURL: "https://easternwh-14c32-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "easternwh-14c32",
  storageBucket: "easternwh-14c32.firebasestorage.app",
  messagingSenderId: "502894254948",
  appId: "1:502894254948:web:0f0dc2b98368fd1d323871",
  measurementId: "G-FWKGTVK2C5"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const recordsRef = ref(db, "heavyEquipmentRecords");
const equipmentRecordsRef = ref(db, "equipmentMasterRecords");

let records = [];
let equipmentRecords = [];

const els = {
  search: document.getElementById("searchInput"),
  chips: document.querySelectorAll(".chip"),
  equipFilter: document.getElementById("equipFilter"),
  sortSelect: document.getElementById("sortSelect"),
  supplierFilter: document.getElementById("supplierFilter"),
  locationFilter: document.getElementById("locationFilter"),
  list: document.getElementById("list"),
  recentList: document.getElementById("recentList"),
  tabDashboard: document.getElementById("tabDashboard"),
  tabRecords: document.getElementById("tabRecords"),
  dashboardPage: document.getElementById("dashboardPage"),
  recordsPage: document.getElementById("recordsPage"),
  statPending: document.getElementById("statPending"),
  statApproved: document.getElementById("statApproved"),
  statReceived: document.getElementById("statReceived"),
  statInstalled: document.getElementById("statInstalled"),
  resultCount: document.getElementById("resultCount"),
  totalCount: document.getElementById("totalCount"),
  clearAllBtn: document.getElementById("clearAllBtn"),
  connDot: document.getElementById("connDot"),
  connText: document.getElementById("connText"),
  moreBtn: document.getElementById("moreBtn"),
  sheet: document.getElementById("sheet"),
  sheetOverlay: document.getElementById("sheetOverlay"),
  sheetReset: document.getElementById("sheetReset"),
  sheetApply: document.getElementById("sheetApply"),
};

let state = {
  q: "",
  status: "",
  equip: "",
  sort: "recent",
  supplier: "",
  location: ""
};

function escapeHTML(value) {
  return String(value ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function normalizeStatus(status) {
  const statusMap = {
    "Pending": "Pending for approval",
    "Received": "Received stored at warehouse"
  };
  return statusMap[status] || status || "Pending for approval";
}

function statusSlug(status) {
  const s = normalizeStatus(status).toLowerCase();
  if (s.includes("install")) return "installed";
  if (s.includes("received")) return "received";
  if (s.includes("approved")) return "approved";
  return "pending";
}

function getEquipmentMeta(equipNo) {
  return equipmentRecords.find(e => String(e.equipNo || "").toLowerCase() === String(equipNo || "").toLowerCase());
}

function populateSelect(selectEl, values, placeholder) {
  const current = selectEl.value;
  selectEl.innerHTML = `<option value="">${placeholder}</option>` +
    values.map(v => `<option value="${escapeHTML(v)}">${escapeHTML(v)}</option>`).join("");
  if (values.includes(current)) selectEl.value = current;
}



function refreshFilterOptions() {
  const equipNos = [...new Set(records.map(r => r.equipNo).filter(Boolean))].sort();
  const suppliers = [...new Set(records.map(r => r.supplier).filter(Boolean))].sort();
  const locations = [...new Set(equipmentRecords.map(e => e.location).filter(Boolean))].sort();
  populateSelect(els.equipFilter, equipNos, "All equipment");
  populateSelect(els.supplierFilter, suppliers, "All suppliers");
  populateSelect(els.locationFilter, locations, "All locations");
}

function dateValue(r) {
  // pick best available timestamp-ish field for "recent" sort
  const candidates = [r.installedDate, r.receivedDate, r.transferDate, r.createdAt, r.updatedAt];
  for (const c of candidates) {
    if (c) {
      const t = Date.parse(c);
      if (!Number.isNaN(t)) return t;
    }
  }
  return 0;
}

function getFiltered() {
  const q = state.q.trim().toLowerCase();
  let filtered = records.filter(r => {
    if (state.status && normalizeStatus(r.status) !== state.status) return false;
    if (state.equip && r.equipNo !== state.equip) return false;
    if (state.supplier && r.supplier !== state.supplier) return false;
    if (state.location) {
      const meta = getEquipmentMeta(r.equipNo);
      if (!meta || meta.location !== state.location) return false;
    }
    if (q) {
      const meta = getEquipmentMeta(r.equipNo);
      const hay = [r.equipNo, r.partName, r.partNumber, r.prNo, r.remarks, r.supplier, r.transferTo, meta?.equipment]
        .map(v => String(v || "").toLowerCase()).join(" ");
      if (!hay.includes(q)) return false;
    }
    return true;
  });

  if (state.sort === "equip") {
    filtered.sort((a, b) => String(a.equipNo || "").localeCompare(String(b.equipNo || "")));
  } else if (state.sort === "part") {
    filtered.sort((a, b) => String(a.partName || "").localeCompare(String(b.partName || "")));
  } else {
    filtered.sort((a, b) => dateValue(b) - dateValue(a));
  }

  return filtered;
}

function renderCard(r) {
  const slug = statusSlug(r.status);
  const meta = getEquipmentMeta(r.equipNo);
  const equipName = meta?.equipment || "";

  const metaItems = [];
  if (r.prNo) metaItems.push(["PR No.", r.prNo]);
  if (r.qty) metaItems.push(["Qty", `${r.qty} ${escapeHTML(r.unit || "")}`.trim()]);
  if (r.supplier) metaItems.push(["Supplier", r.supplier]);
  if (r.prDate) metaItems.push(["PR Date", r.prDate]);
  if (r.receivedDate) metaItems.push(["Received", r.receivedDate]);
  if (r.installedDate) metaItems.push(["Installed", r.installedDate]);
  if (r.transferTo) metaItems.push(["Transfer To", r.transferTo]);
  if (r.transferDate) metaItems.push(["Transfer Date", r.transferDate]);

  const metaHTML = metaItems.map(([k, v]) => `
    <div class="meta-item">
      <span class="k">${escapeHTML(k)}</span>
      <span class="v">${escapeHTML(v)}</span>
    </div>
  `).join("");

  return `
    <div class="card s-${slug}">
      <div class="card-top">
        <div class="card-equip">
          ${meta?.picture ? `<img class="equip-thumb" src="${meta.picture}" alt="${escapeHTML(equipName)}" onclick="window.__openPhoto('${meta.picture.replace(/'/g, "\\'")}')" />` : ""}
          <span class="equip-pill">${escapeHTML(r.equipNo || "—")}</span>
        </div>
        <span class="badge s-${slug}">${escapeHTML(normalizeStatus(r.status))}</span>
      </div>
      <div class="part-name">${escapeHTML(r.partName || "Untitled part")}</div>
      ${r.partNumber ? `<div class="part-number">${escapeHTML(r.partNumber)}</div>` : ""}
      ${equipName ? `<div class="card-foot-row"><span class="tagbit">${escapeHTML(equipName)}${meta?.location ? ` · ${escapeHTML(meta.location)}` : ""}</span></div>` : ""}
      ${metaItems.length ? `<div class="meta-grid">${metaHTML}</div>` : ""}
      ${r.remarks ? `<div class="remarks">"${escapeHTML(r.remarks)}"</div>` : ""}
    </div>
  `;
}

function showTab(tab) {
  els.tabDashboard.classList.toggle("active", tab === "dashboard");
  els.tabRecords.classList.toggle("active", tab === "records");
  els.dashboardPage.classList.toggle("active-page", tab === "dashboard");
  els.recordsPage.classList.toggle("active-page", tab === "records");
}
els.tabDashboard.addEventListener("click", () => showTab("dashboard"));
els.tabRecords.addEventListener("click", () => showTab("records"));

function renderDashboard() {
  const counts = { pending: 0, approved: 0, received: 0, installed: 0 };
  records.forEach(r => {
    const slug = statusSlug(r.status);
    if (counts[slug] !== undefined) counts[slug]++;
  });
  els.statPending.textContent = counts.pending;
  els.statApproved.textContent = counts.approved;
  els.statReceived.textContent = counts.received;
  els.statInstalled.textContent = counts.installed;

  const recent = [...records].sort((a, b) => dateValue(b) - dateValue(a)).slice(0, 5);
  els.recentList.innerHTML = recent.length
    ? recent.map(renderCard).join("")
    : `<div class="empty"><div class="icon">📭</div><h3>No records yet</h3><p>Records will appear here once added.</p></div>`;
}

function render() {
  const filtered = getFiltered();
  els.totalCount.textContent = records.length;
  els.resultCount.textContent = filtered.length;

  const anyFilterActive = state.q || state.status || state.equip || state.supplier || state.location;
  els.clearAllBtn.classList.toggle("show", !!anyFilterActive);
  els.moreBtn.classList.toggle("active", !!(state.supplier || state.location));

  if (filtered.length === 0) {
    els.list.innerHTML = `
      <div class="empty">
        <div class="icon">🔍</div>
        <h3>No matching records</h3>
        <p>Try a different search term or clear your filters.</p>
      </div>
    `;
    return;
  }

  els.list.innerHTML = filtered.map(renderCard).join("");
}

// --- events ---
els.search.addEventListener("input", () => { state.q = els.search.value; render(); });

els.chips.forEach(chip => {
  chip.addEventListener("click", () => {
    els.chips.forEach(c => c.classList.remove("active"));
    chip.classList.add("active");
    state.status = chip.dataset.status;
    render();
  });
});

els.equipFilter.addEventListener("change", () => { state.equip = els.equipFilter.value; render(); });
els.sortSelect.addEventListener("change", () => { state.sort = els.sortSelect.value; render(); });

els.clearAllBtn.addEventListener("click", () => {
  state = { q: "", status: "", equip: "", sort: state.sort, supplier: "", location: "" };
  els.search.value = "";
  els.equipFilter.value = "";
  els.supplierFilter.value = "";
  els.locationFilter.value = "";
  els.chips.forEach(c => c.classList.toggle("active", c.dataset.status === ""));
  render();
});

function openSheet() {
  els.sheet.classList.add("open");
  els.sheetOverlay.classList.add("open");
}
function closeSheet() {
  els.sheet.classList.remove("open");
  els.sheetOverlay.classList.remove("open");
}
els.moreBtn.addEventListener("click", openSheet);
els.sheetOverlay.addEventListener("click", closeSheet);
els.sheetApply.addEventListener("click", () => {
  state.supplier = els.supplierFilter.value;
  state.location = els.locationFilter.value;
  closeSheet();
  render();
});
els.sheetReset.addEventListener("click", () => {
  els.supplierFilter.value = "";
  els.locationFilter.value = "";
  state.supplier = "";
  state.location = "";
  closeSheet();
  render();
});

const photoLightbox = document.getElementById("photoLightbox");
const photoLightboxImg = document.getElementById("photoLightboxImg");
window.__openPhoto = function (src) {
  photoLightboxImg.src = src;
  photoLightbox.classList.add("open");
};
photoLightbox.addEventListener("click", () => {
  photoLightbox.classList.remove("open");
  photoLightboxImg.src = "";
});

// --- firebase ---
onValue(recordsRef, snapshot => {
  const data = snapshot.val() || {};
  records = Object.entries(data).map(([id, value]) => ({ id, ...value }));
  els.connDot.className = "dot live";
  els.connText.textContent = "Live";
  refreshFilterOptions();
  render();
  renderDashboard();
}, () => {
  els.connDot.className = "dot err";
  els.connText.textContent = "Offline";
});

onValue(equipmentRecordsRef, snapshot => {
  const data = snapshot.val() || {};
  equipmentRecords = Object.entries(data).map(([id, value]) => ({ id, ...value }));
  refreshFilterOptions();
  render();
  renderDashboard();
});

render();
renderDashboard();
</script>
</body>
</html>
